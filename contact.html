<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | MoneyLab</title>
  <meta name="description" content="MoneyLabへのお問い合わせはこちらからお願いいたします。">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .contact-content { max-width: 600px; margin: 0 auto; padding: 60px 20px 80px; text-align: center; }
    .contact-content h1 { font-size: 28px; font-weight: 800; margin-bottom: 16px; letter-spacing: -0.02em; }
    .contact-content p { color: var(--text-secondary); line-height: 1.9; font-size: 15px; margin-bottom: 32px; }
    .contact-form { text-align: left; }
    .contact-form .form-group { margin-bottom: 20px; }
    .contact-form label { display: block; font-size: 14px; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; }
    .contact-form input, .contact-form textarea {
      width: 100%; padding: 14px 16px; background: var(--bg-tertiary); border: 1px solid var(--glass-border);
      border-radius: var(--border-radius-md); color: var(--text-primary); font-family: var(--font-primary);
      font-size: 15px; transition: var(--transition); outline: none; text-align: left;
    }
    .contact-form input:focus, .contact-form textarea:focus {
      border-color: var(--accent-green); box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
    }
    .contact-form textarea { min-height: 150px; resize: vertical; }
    .submit-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 16px 32px; background: var(--gradient-primary); border: none;
      border-radius: var(--border-radius-md); color: white; font-family: var(--font-primary);
      font-size: 16px; font-weight: 700; cursor: pointer; transition: var(--transition);
    }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(16, 185, 129, 0.3); }
    .note { margin-top: 24px; font-size: 13px; color: var(--text-muted); }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo"><div class="logo-icon">¥</div><div class="logo-text"><span>MoneyLab</span></div></a>
      <div class="header-badge">2026年度対応</div>
    </div>
  </header>

  <main class="contact-content">
    <h1>お問い合わせ</h1>
    <p>MoneyLabに関するご質問、ご意見、不具合のご報告等がございましたら、以下のフォームよりお気軽にお問い合わせください。</p>

    <form class="contact-form glass-card" id="contact-form" action="#" onsubmit="event.preventDefault(); alert('お問い合わせありがとうございます。現在フォーム機能は準備中です。');">
      <div class="form-group">
        <label for="contact-name">お名前</label>
        <input type="text" id="contact-name" name="name" placeholder="山田 太郎" required>
      </div>
      <div class="form-group">
        <label for="contact-email">メールアドレス</label>
        <input type="email" id="contact-email" name="email" placeholder="example@email.com" required>
      </div>
      <div class="form-group">
        <label for="contact-subject">件名</label>
        <input type="text" id="contact-subject" name="subject" placeholder="お問い合わせの件名">
      </div>
      <div class="form-group">
        <label for="contact-message">お問い合わせ内容</label>
        <textarea id="contact-message" name="message" placeholder="お問い合わせ内容をご記入ください" required></textarea>
      </div>
      <button type="submit" class="submit-btn" id="submit-btn">送信する →</button>
    </form>
    <p class="note">※ 返信には数日いただく場合がございます。</p>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-links">
        <a href="privacy.html">プライバシーポリシー</a>
        <a href="terms.html">利用規約</a>
        <a href="contact.html">お問い合わせ</a>
      </div>
      <p>© 2026 MoneyLab.</p>
    </div>
  </footer>
</body>
</html>
