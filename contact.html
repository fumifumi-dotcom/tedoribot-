    }
    .form-field textarea { min-height: 150px; resize: vertical; }
    .submit-btn {
      padding: 16px 32px; background: var(--gradient-primary); color: white; border: none;
      border-radius: var(--border-radius-md); font-size: 16px; font-weight: 700;
      cursor: pointer; transition: var(--transition); font-family: var(--font-primary);
    }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(16,185,129,0.3); }
    .alt-contact { margin-top: 32px; padding: 20px; background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: var(--border-radius-lg); }
