    .testimonial-box { border-left: 3px solid #8b5cf6; background: rgba(139,92,246,0.04); padding: 16px 20px; border-radius: 0 var(--border-radius-sm) var(--border-radius-sm) 0; font-style: italic; font-size: 14px; color: var(--text-primary); line-height: 1.7; margin: 20px 0; }
    .btn-primary { display: inline-flex; align-items: center; justify-content: center; width: 100%; background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%); color: white; padding: 16px 32px; border-radius: 9999px; font-weight: 700; font-size: 16px; text-decoration: none; border: none; cursor: pointer; box-shadow: 0 8px 24px rgba(139,92,246,0.3); transition: all 0.2s; font-family: inherit; }

    .urgency-box { background: linear-gradient(135deg, rgba(239,68,68,0.06), rgba(245,158,11,0.06)); border: 1px solid rgba(239,68,68,0.12); border-radius: var(--border-radius-lg); padding: 32px; text-align: center; margin-top: 32px; }
    @keyframes pulseRed { 0% { box-shadow: 0 8px 24px rgba(239,68,68,0.3); } 50% { box-shadow: 0 8px 32px rgba(239,68,68,0.5); } 100% { box-shadow: 0 8px 24px rgba(239,68,68,0.3); } }

  <script>
  // ============================================================
  // AI絶望度診断（裏名：人生満足度診断）
  // ============================================================
  const app = document.getElementById('diag-app');
  let state = 'intro';
  let qIndex = 0;
  let answers = {};

  const questions = [
    { id:'money', title:'現在の世帯年収は、理想の生活に対してどれくらい足りていますか？',
      options:[
        {label:'全く足りない — 毎月の貯金ができない', value:'low', score:15},
        {label:'少し足りない — 贅沢はできず将来が不安', value:'mid', score:30},
        {label:'足りている — 十分な貯蓄ができている', value:'ok', score:80}
      ]},
    { id:'career', title:'老後の資金（最低2,000万円）を準備できる見通しは立っていますか？',
      options:[
        {label:'全く立っていない — どうしていいか分からない', value:'low', score:10},
        {label:'不安がある — 少し貯金しているが足りるか不明', value:'mid', score:25},
        {label:'見通しが立っている — NISA等で計画的に準備中', value:'ok', score:80}
      ]},
    { id:'life', title:'今のまま働き続けた場合、5年後の自分はどうなっていると思いますか？',
      options:[
        {label:'今より状況が悪化している気がする', value:'low', score:5},
        {label:'今と同じレベルで現状維持', value:'mid', score:25},
        {label:'年収も上がり生活も豊かになっている', value:'ok', score:80}
      ]}
  ];

  function getScore() {
    let t = 0;
    questions.forEach(q => { if(answers[q.id]) t += answers[q.id].score; });
    // 辛口のスコアリング（合計値 / 3）
    return Math.round(t / 3);
  }

  function getDeficit() {
    const s = getScore();
    if(s < 30) return 4200; // 万
    if(s < 50) return 2800; // 万
    if(s < 70) return 1500; // 万
    return 0;
  }

  function render() {
    app.innerHTML = '';
    window.scrollTo({top: 0, behavior: 'smooth'});
    if(state === 'intro') renderIntro();
    else if(state === 'question') renderQuestion();
    else if(state === 'loading') renderLoading();
    else if(state === 'lead') renderLead();
    else if(state === 'result') renderResult();
  }

  function renderIntro() {
    app.innerHTML = `
      <div class="diag-hero">
        <div class="diag-badge" style="background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.2); color: #ef4444;"><span class="dot" style="background: #ef4444;"></span> 生涯賃金リスク診断</div>
        <h1 class="diag-title">このまま働き続けると<br>あなたの「老後」はどうなる？</h1>
        <p class="diag-subtitle">収入と将来への備えから、あなたの「生涯賃金のショート額」をAIが算定。<br>たった60秒の質問で、残酷な現実と「回避するための解決策」を提示します。</p>
      </div>
      <div class="diag-card" style="text-align:center;">
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-bottom:28px;">
          <div style="padding:20px 12px; background:rgba(239,68,68,0.06); border-radius:var(--border-radius-md);">
            <div style="font-size:28px; margin-bottom:6px;">📉</div>
            <div style="font-size:13px; font-weight:600; color:var(--text-primary);">破産リスク</div>
          </div>
          <div style="padding:20px 12px; background:rgba(245,158,11,0.06); border-radius:var(--border-radius-md);">
            <div style="font-size:28px; margin-bottom:6px;">💰</div>
            <div style="font-size:13px; font-weight:600; color:var(--text-primary);">生涯欠損額</div>
          </div>
          <div style="padding:20px 12px; background:rgba(16,185,129,0.06); border-radius:var(--border-radius-md);">
            <div style="font-size:28px; margin-bottom:6px;">🛡️</div>
            <div style="font-size:13px; font-weight:600; color:var(--text-primary);">回避策提示</div>
          </div>
        </div>
        <button class="btn-primary" style="background: linear-gradient(135deg, #ef4444, #dc2626); box-shadow: 0 8px 24px rgba(239,68,68,0.3);" onclick="state='question'; qIndex=0; render();">無料で破産リスクを診断する（60秒）</button>
        <p style="font-size:12px; color:var(--text-muted); margin-top:12px;">✅ 登録不要 ｜ 完全無料 ｜ 3問で完了</p>
      </div>
    `;
  }

  function renderQuestion() {
    const q = questions[qIndex];
    const progressHtml = questions.map((_,i) =>
      '<div class="progress-dot '+(i<qIndex?'done':'')+(i===qIndex?' active':'')+'"></div>'
    ).join('');
    app.innerHTML = `
      <div class="diag-card">
        <div class="q-num">質問 ${qIndex+1} / ${questions.length}</div>
        <div class="q-title">${q.title}</div>
        <div class="option-list">
          ${q.options.map((o,i) => `
            <div class="option-item" onclick="pickAnswer('${q.id}','${o.value}',${o.score})">
              <div class="option-num">${String.fromCharCode(65+i)}</div>
              <div class="option-text">${o.label}</div>
            </div>
          `).join('')}
        </div>
        <div class="progress-row">${progressHtml}</div>
      </div>
    `;
  }

  window.pickAnswer = function(id, value, score) {
    answers[id] = {value, score};
    if(qIndex < questions.length - 1) { qIndex++; render(); }
    else { state = 'loading'; render(); }
  };

  function renderLoading() {
    app.innerHTML = `
      <div class="diag-card" style="text-align:center;">
        <div style="font-size:40px; margin-bottom:16px;">🔬</div>
        <h2 style="font-size:20px; font-weight:700; margin-bottom:8px;">AIがあなたの生涯賃金リスクを解析中...</h2>
        <p style="font-size:14px; color:var(--text-secondary);">回答内容をベースに、同年代との格差と将来の破産確率を算出しています。</p>
        <div class="loading-bar-wrap"><div class="loading-bar-fill" id="lb" style="background: linear-gradient(90deg, #ef4444, #f59e0b);"></div></div>
        <p id="lt" style="color:#ef4444; font-weight:700; font-size:18px;">0%</p>
      </div>
    `;
    let p = 0;
    const iv = setInterval(() => {
      p += Math.random() * 15;
      if(p >= 100) { p = 100; clearInterval(iv); setTimeout(() => { state='lead'; render(); }, 500); }
      document.getElementById('lb').style.width = p+'%';
      document.getElementById('lt').innerText = Math.floor(p)+'%';
    }, 200);
  }

  // A8.net FP相談ダミーリンク (※後で本物に差し替える)
  const AFF = {
    fpConsult: 'https://px.a8.net/svt/ejp?a8mat=FP_CONSULTATION_DUMMY',
    career: 'https://px.a8.net/svt/ejp?a8mat=4B1OTT+6P4KS2+47GS+5YRHE'
  };

  function renderLead() {
    const score = getScore();
    const deficit = getDeficit();
    
    if (deficit > 0) {
      app.innerHTML = `
        <div class="diag-card" style="text-align:center; border-color: rgba(239,68,68,0.3);">
          <div class="diag-badge" style="margin-bottom:20px; background: rgba(239,68,68,0.1); color: #ef4444;"><span class="dot" style="background:#ef4444;"></span> 解析完了：警告</div>
          <h2 style="font-size:22px; font-weight:800; margin-bottom:20px; color:#ef4444;">🚨 あなたの将来の家計は【危険水域】です</h2>
          <div class="score-circle" style="border-color: #ef4444; background: rgba(239,68,68,0.05);">
            <div class="score-value" style="background: #ef4444; -webkit-text-fill-color: transparent; -webkit-background-clip: text;">${score}</div>
            <div class="score-unit" style="color: #ef4444;">/ 100点 (安全性)</div>
          </div>
          <div style="background: rgba(239,68,68,0.1); padding: 24px; border-radius: 12px; margin-bottom: 24px;">
            <p style="font-size:14px; color:#ef4444; font-weight:bold; margin-bottom: 8px;">推定される生涯資金のショート額</p>
            <div style="font-size: 32px; font-weight: 900; color: #ef4444;">約 -${deficit}万円</div>
          </div>
          <p style="font-size:14px; color:var(--text-secondary); margin-bottom:24px; line-height:1.7;">このまま何も対策を打たなかった場合、老後に資金が完全に枯渇する可能性が極めて高いです。<br>手遅れになる前に、<strong>「自分の市場価値と年収を強制的に引き上げる方法」</strong>を確認してください。</p>
          <button class="btn-primary" style="background: linear-gradient(135deg, #ef4444, #dc2626); box-shadow: 0 8px 24px rgba(239,68,68,0.3);" onclick="state='result'; render();">絶望を回避する唯一の解決策を見る</button>
        </div>
      `;
    } else {
      app.innerHTML = `
        <div class="diag-card" style="text-align:center;">
          <div class="diag-badge" style="margin-bottom:20px;"><span class="dot" style="background:var(--accent-green);"></span> 解析完了：安全</div>
          <h2 style="font-size:22px; font-weight:800; margin-bottom:20px;">あなたの将来の家計は【安全圏】です</h2>
          <div class="score-circle">
            <div class="score-value" style="background: #10b981; -webkit-text-fill-color: transparent; -webkit-background-clip: text;">${score}</div>
            <div class="score-unit">/ 100点 (安全性)</div>
          </div>
          <p style="font-size:16px; margin-bottom:8px;">生涯資金のショートリスクは <span style="color:#10b981; font-weight:bold;">0万円（なし）</span> です。</p>
          <p style="font-size:14px; color:var(--text-secondary); margin-bottom:24px; line-height:1.7;">今のペースで資産形成を続ければ老後も安泰です。<br>さらに資産を拡大するための次のステップを確認してください。</p>
          <button class="btn-primary" onclick="state='result'; render();">資産をさらに増やすプランを見る</button>
        </div>
      `;
    }
  }

  function renderResult() {
    const score = getScore();
    const deficit = getDeficit();

    if (deficit > 0) {
      app.innerHTML = `
        <div class="diag-card">
          <div class="diag-badge" style="background: rgba(239,68,68,0.1); color: #ef4444;"><span class="dot" style="background:#ef4444;"></span> 最優先の解決策</div>
          <h1 style="font-size:24px; font-weight:800; line-height:1.4; margin-bottom:16px;">不足額 ${deficit}万円を埋めるための<br>「無料」のアクションプラン</h1>

          <!-- STEP 1: キャリア相談（最強のコンバージョン導線） -->
          <div class="result-section" style="background: rgba(16,185,129,0.05); padding: 24px; border-radius: 12px; border: 2px solid #10b981; margin-bottom: 24px;">
            <h3 style="color: #10b981;">STEP 1（絶対やるべき）</h3>
            <h2>👨‍💻 プロのキャリアアドバイザーに「無料」で相談し、適正年収に引き上げる</h2>
            <p>今のまま自力でどうにかしようとしても限界があります。あなたの市場価値はもっと高いはずです。<strong>プロのアドバイザーに無料で相談</strong>して、自分の適正年収と強みを引き出してもらってください。</p>
            <ul class="check-list" style="margin-bottom: 24px;">
              <li>相談は何度でも「完全無料」</li>
              <li>あなたの本当の市場価値と適正年収がわかる</li>
              <li>強引な転職の勧誘は一切ありません</li>
            </ul>
            <a href="https://px.a8.net/svt/ejp?a8mat=4B1OTT+6P4KS2+47GS+5YRHE" target="_blank" rel="noopener sponsored" class="btn-primary" style="background:linear-gradient(135deg, #10b981, #059669); font-size: 18px; padding: 20px;">【完全無料】プロにキャリア相談を申し込む →</a>
            <p style="text-align:center; font-size:12px; color:var(--text-muted); margin-top:12px;">※相談だけでも今の年収の低さに気づけます</p>
          </div>

          <!-- STEP 2: 転職（サブ導線） -->
          <div class="result-section">
            <h3>STEP 2</h3>
            <h2>🚀 収入の根本（年収）を上げる</h2>
            <p>節約には限界がありますが、年収アップには限界がありません。まずは自分のスキルが他社ならいくらで売れるのか、「適正年収」を診断してみてください。</p>
            <a href="${AFF.career}" target="_blank" rel="noopener sponsored" class="btn-primary" style="background:linear-gradient(135deg, var(--accent-blue), #2563eb);">【無料】自分の市場価値（適正年収）を診断する →</a>
          </div>
