    .btn-primary { display: inline-flex; align-items: center; justify-content: center; width: 100%; background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%); color: white; padding: 16px 32px; border-radius: 9999px; font-weight: 700; font-size: 16px; text-decoration: none; border: none; cursor: pointer; box-shadow: 0 8px 24px rgba(139,92,246,0.3); transition: all 0.2s; font-family: inherit; }

    .urgency-box { background: linear-gradient(135deg, rgba(239,68,68,0.06), rgba(245,158,11,0.06)); border: 1px solid rgba(239,68,68,0.12); border-radius: var(--border-radius-lg); padding: 32px; text-align: center; margin-top: 32px; }

  <script>
  // ============================================================
  // AI人生満足度診断ファネル
  // ============================================================
  const app = document.getElementById('diag-app');
  let state = 'intro';
  let qIndex = 0;
  let answers = {};

  const questions = [
    { id:'money', title:'今の収入に満足していますか？',
      options:[
        {label:'全く満足していない — もっと稼ぎたい', value:'low', score:3},
        {label:'やや不満がある — 贅沢はできない', value:'mid', score:2},
        {label:'まあまあ満足している', value:'ok', score:1}
      ]},
    { id:'career', title:'今のキャリアに将来性を感じますか？',
      options:[
        {label:'不安しかない — このままでいいのか疑問', value:'low', score:3},
        {label:'少し不安がある — 漠然とした将来像', value:'mid', score:2},
        {label:'特に不安はない — 方向性は見えている', value:'ok', score:1}
      ]},
    { id:'life', title:'プライベート（人間関係・健康・趣味）は充実していますか？',
      options:[
        {label:'充実していない — 仕事に追われている', value:'low', score:3},
        {label:'まあまあ — 可もなく不可もなく', value:'mid', score:2},
        {label:'充実している — バランスが取れている', value:'ok', score:1}
      ]}
  ];

  function getScore() {
    let t = 0;
    questions.forEach(q => { if(answers[q.id]) t += answers[q.id].score; });
    return Math.round((1 - (t - 3) / 6) * 100);
  }

  function getPotential() {
    const s = getScore();
    if(s < 40) return 52;
    if(s < 60) return 36;
    if(s < 80) return 24;
    return 15;
  }

  function render() {
    app.innerHTML = '';
    window.scrollTo({top: 0, behavior: 'smooth'});
    if(state === 'intro') renderIntro();
    else if(state === 'question') renderQuestion();
    else if(state === 'loading') renderLoading();
    else if(state === 'lead') renderLead();
    else if(state === 'result') renderResult();
  }

  function renderIntro() {
    app.innerHTML = `
      <div class="diag-hero">
        <div class="diag-badge"><span class="dot"></span> AI人生満足度診断</div>
        <h1 class="diag-title">あなたの人生、<br>本当に最適化されていますか？</h1>
        <p class="diag-subtitle">収入・キャリア・プライベートの3軸でAIがあなたの人生満足度を分析。<br>たった60秒で、年間の改善余地と具体的なアクションプランを無料でお届けします。</p>
      </div>
      <div class="diag-card" style="text-align:center;">
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-bottom:28px;">
          <div style="padding:20px 12px; background:rgba(139,92,246,0.06); border-radius:var(--border-radius-md);">
            <div style="font-size:28px; margin-bottom:6px;">💰</div>
            <div style="font-size:13px; font-weight:600; color:var(--text-primary);">収入最適化</div>
          </div>
          <div style="padding:20px 12px; background:rgba(59,130,246,0.06); border-radius:var(--border-radius-md);">
            <div style="font-size:28px; margin-bottom:6px;">🚀</div>
            <div style="font-size:13px; font-weight:600; color:var(--text-primary);">キャリア設計</div>
          </div>
          <div style="padding:20px 12px; background:rgba(16,185,129,0.06); border-radius:var(--border-radius-md);">
            <div style="font-size:28px; margin-bottom:6px;">❤️</div>
            <div style="font-size:13px; font-weight:600; color:var(--text-primary);">ライフバランス</div>
          </div>
        </div>
        <button class="btn-primary" onclick="state='question'; qIndex=0; render();">無料で診断をはじめる（60秒）</button>
        <p style="font-size:12px; color:var(--text-muted); margin-top:12px;">✅ 登録不要 ｜ 完全無料 ｜ 3問で完了</p>
      </div>
    `;
  }

  function renderQuestion() {
    const q = questions[qIndex];
    const progressHtml = questions.map((_,i) =>
      '<div class="progress-dot '+(i<qIndex?'done':'')+(i===qIndex?' active':'')+'"></div>'
    ).join('');
    app.innerHTML = `
      <div class="diag-card">
        <div class="q-num">質問 ${qIndex+1} / ${questions.length}</div>
        <div class="q-title">${q.title}</div>
        <div class="option-list">
          ${q.options.map((o,i) => `
            <div class="option-item" onclick="pickAnswer('${q.id}','${o.value}',${o.score})">
              <div class="option-num">${String.fromCharCode(65+i)}</div>
              <div class="option-text">${o.label}</div>
            </div>
          `).join('')}
        </div>
        <div class="progress-row">${progressHtml}</div>
      </div>
    `;
  }

  window.pickAnswer = function(id, value, score) {
    answers[id] = {value, score};
    if(qIndex < questions.length - 1) { qIndex++; render(); }
    else { state = 'loading'; render(); }
  };

  function renderLoading() {
    app.innerHTML = `
      <div class="diag-card" style="text-align:center;">
        <div style="font-size:40px; margin-bottom:16px;">🔬</div>
        <h2 style="font-size:20px; font-weight:700; margin-bottom:8px;">AIがあなたの人生満足度を解析中...</h2>
        <p style="font-size:14px; color:var(--text-secondary);">回答内容を3軸で分析し、最適化ポイントを算出しています。</p>
        <div class="loading-bar-wrap"><div class="loading-bar-fill" id="lb"></div></div>
        <p id="lt" style="color:#8b5cf6; font-weight:700; font-size:18px;">0%</p>
      </div>
    `;
    let p = 0;
    const iv = setInterval(() => {
      p += Math.random() * 15;
      if(p >= 100) { p = 100; clearInterval(iv); setTimeout(() => { state='lead'; render(); }, 500); }
      document.getElementById('lb').style.width = p+'%';
      document.getElementById('lt').innerText = Math.floor(p)+'%';
    }, 200);
  }

  // A8.net 提携済みアフィリエイトリンク
  const AFF = {
    career: 'https://px.a8.net/svt/ejp?a8mat=4B1OTT+6P4KS2+47GS+5YRHE',
    rakutenFurusato: 'https://rpx.a8.net/svt/ejp?a8mat=4B1OTR+ACPDGY+2HOM+6C1VM&rakuten=y&a8ejpredirect=http%3A%2F%2Fhb.afl.rakuten.co.jp%2Fhgc%2F0ea62065.34400275.0ea62066.204f04c0%2Fa26041903646_4B1OTR_ACPDGY_2HOM_6C1VM%3Fpc%3Dhttp%253A%252F%252Fevent.rakuten.co.jp%252Ffurusato%252F%26m%3Dhttp%253A%252F%252Fm.rakuten.co.jp%252F',
    matsuiNisa: 'https://px.a8.net/svt/ejp?a8mat=4B1PLP+ACPDGY+3XCC+6AZAQ',
    matsuiIdeco: 'https://px.a8.net/svt/ejp?a8mat=4B1OTT+6MQUCY+3XCC+BXIYQ',
  };

  function renderLead() {
    const score = getScore();
    const pot = getPotential();
    app.innerHTML = `
      <div class="diag-card" style="text-align:center;">
        <div class="diag-badge" style="margin-bottom:20px;"><span class="dot" style="background:var(--accent-green);"></span> 解析完了</div>
        <h2 style="font-size:22px; font-weight:800; margin-bottom:20px;">あなたの人生満足度スコア</h2>
        <div class="score-circle">
          <div class="score-value">${score}</div>
          <div class="score-unit">/ 100点</div>
        </div>
        <p style="font-size:16px; margin-bottom:8px;">あなたには年間 <span class="highlight-amber" style="font-size:24px;">${pot}万円分</span> の最適化余地があります。</p>
        <p style="font-size:14px; color:var(--text-secondary); margin-bottom:24px; line-height:1.7;">あなたの回答を分析した結果、<strong>今すぐ改善できる具体的なアクション</strong>が見つかりました。<br>すべて無料で始められます。</p>
        <button class="btn-primary" onclick="state='result'; render();">あなた専用の改善プランを見る（無料）</button>
      </div>
    `;
  }

  function renderResult() {
    const score = getScore();
    const pot = getPotential();
    const m = answers.money?.value || 'mid';
    const c = answers.career?.value || 'mid';

    app.innerHTML = `
      <div class="diag-card">
        <div class="diag-badge"><span class="dot" style="background:var(--accent-green);"></span> あなた専用の改善プラン</div>
        <h1 style="font-size:24px; font-weight:800; line-height:1.4; margin-bottom:16px;">満足度 ${score}点のあなたが<br>年間<span class="highlight-amber">${pot}万円</span>得するための3ステップ</h1>

        <!-- STEP 1: 転職・年収アップ（収入不満の場合に強調） -->
        <div class="result-section">
          <h3>STEP 1${m !== 'ok' ? '（最優先）' : ''}</h3>
          <h2>🚀 まずは自分の「適正年収」を知る</h2>
          <p>${m === 'low' ? '収入に全く満足していないあなたは、今の年収が市場価値より低い可能性が高いです。' : m === 'mid' ? 'やや不満を感じているなら、同じスキルでもっと高い年収の会社がある可能性があります。' : '収入に満足していても、適正年収を知っておくことはキャリア戦略の基本です。'}転職しなくても<strong>自分の市場価値を知るだけ</strong>で、年収交渉や副業選びの判断軸が変わります。</p>
          <ul class="check-list">
            <li>完全無料で5分で診断完了</li>
            <li>転職しなくてもOK — 市場価値を知るだけ</li>
            <li>年収100〜300万円アップの事例多数</li>
          </ul>
          <a href="${AFF.career}" target="_blank" rel="noopener sponsored" class="btn-primary" style="background:linear-gradient(135deg, var(--accent-green), var(--accent-blue));">【無料】年収・市場価値診断を受ける →</a>
        </div>

        <!-- STEP 2: ふるさと納税 -->
        <div class="result-section">
          <h3>STEP 2</h3>
          <h2>🏡 ふるさと納税で「確実に」手取りを増やす</h2>
          <p>ふるさと納税をまだやっていないなら、<strong>毎年数万円を国に捨てている</strong>のと同じです。自己負担たった2,000円で、お肉・お米・海鮮などの返礼品がもらえます。やらない理由がありません。</p>
          <ul class="check-list">
            <li>自己負担2,000円で返礼品がもらえる</li>
            <li>年収500万なら約6万円分の返礼品</li>
            <li>楽天ポイントも貯まってさらにお得</li>
          </ul>
          <a href="${AFF.rakutenFurusato}" target="_blank" rel="noopener sponsored" class="btn-primary" style="background:linear-gradient(135deg, #ea580c, #dc2626);">楽天ふるさと納税で返礼品を探す →</a>
          <a href="/furusato.html" style="display:block; text-align:center; margin-top:12px; font-size:13px; color:var(--accent-blue); text-decoration:none;">→ まずは自分の上限額を計算する</a>
        </div>

        <!-- STEP 3: 証券口座・NISA -->
        <div class="result-section">
          <h3>STEP 3</h3>
          <h2>📈 NISAで「お金に働いてもらう」仕組みを作る</h2>
          <p>手取りを増やしたら、次は<strong>増えたお金を非課税で運用</strong>する番です。新NISAなら運用益が完全非課税。月3万円の積立で、20年後には約1,200万円になります。</p>
          <ul class="check-list">
            <li>運用益が完全非課税（通常は約20%課税）</li>
            <li>月100円からスタート可能</li>
            <li>ネット証券なら手数料無料</li>
          </ul>
          <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <a href="${AFF.matsuiNisa}" target="_blank" rel="noopener sponsored" class="btn-primary" style="flex:1; min-width:200px; background:linear-gradient(135deg, #4f46e5, #7c3aed);">松井証券でNISA口座を開設 →</a>
            <a href="${AFF.matsuiIdeco}" target="_blank" rel="noopener sponsored" class="btn-primary btn-outline" style="flex:1; min-width:200px;">iDeCoで節税も始める →</a>
          </div>
          <a href="/compound.html" style="display:block; text-align:center; margin-top:12px; font-size:13px; color:var(--accent-blue); text-decoration:none;">→ 積立シミュレーションで将来の資産を計算する</a>

        <!-- まとめ -->
