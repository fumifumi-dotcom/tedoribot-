name: Tedoribot Autonomous Runner

on:
  schedule:
    # JST = UTC + 9
    # GitHub Actionsの遅延回避のため15分に設定
    # 日本時間 8:15
    - cron: '15 23 * * *'
    # 日本時間 12:15
    - cron: '15 3 * * *'
    # 日本時間 20:15
    - cron: '15 11 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get install -y ffmpeg

      - name: Run Auto X Poster
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 auto_x_poster.py

      - name: Run SNS PDCA Evaluator
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
        run: python3 sns_pdca_evaluator.py

      - name: Commit PDCA learning data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sns_content/tweet_history.json sns_content/templates.json sns_content/tweet_state.txt
          git commit -m "Auto-update PDCA learning state [skip ci]" || echo "No changes to commit"
          git push
