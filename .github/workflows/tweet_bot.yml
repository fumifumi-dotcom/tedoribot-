name: Auto X Poster

on:
  schedule:
    # 毎日 日本時間 朝8時, 昼12時, 夜20時 に投稿
    # UTC時刻で指定（JSTの-9時間）
    - cron: '0 23 * * *'
    - cron: '0 3 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch: # 手動実行用

jobs:
  post-tweet:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install tweepy
        
    - name: Run Auto Poster Strategy
      env:
        TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
        TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
        TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
        TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
      run: python auto_x_poster.py
      
    - name: Commit state tracking
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add sns_content/tweet_state.txt
        git commit -m "Auto-update tweet sequence state" || echo "No changes to commit"
        git push
